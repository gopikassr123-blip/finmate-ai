<!DOCTYPE html>
<html>
<head>
    <title>FinMate AI</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <div class="chat-container">
        <h1>💰 FinMate AI</h1>
        <p>Your AI Finance Chatbot</p>

        <div id="chat-box">
            <div class="bot-message">
                Hi! I am FinMate AI. Ask me about budgeting, saving, or expenses.
            </div>
        </div>

        <div class="input-area">
            <input type="text" id="user-input" placeholder="Type your finance question...">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
